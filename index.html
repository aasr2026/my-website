<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صفحتي الشخصية</title>

<style>

body{
    background:#f2f2f2;
    font-family:Arial;
}

.card{
    background:white;
    width:300px;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 10px gray;
}

img{
    width:120px;
    border-radius:50%;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0055cc;
}

</style>
</head>

<body>

<div class="card">

<img src="https://picsum.photos/200">

<h1>نور</h1>

<p>
مبتدئة بتطوير الويب والأمن السيبراني
</p>

<button onclick="showMessage()">
تواصل معي
</button>

</div>

<script>

function showMessage(){
    alert("أهلاً بك 😊");
}

</script>

</body>
</html>
